model:
  name: unsloth/Qwen3-4B-Thinking-2507
data:
  dataset_path: tunedataset_600v2.jsonl
  max_seq_length: 1024
adapter:
  rank: 16
  alpha: 16.0
  dropout: 0.1
  freeze_layer_scales: false
  lower_layers:
  - 0
  - 1
  - 2
  - 3
  - 4
  middle_layers:
  - 12
  - 13
  - 14
  - 15
  - 16
  upper_layers:
  - 25
  - 26
  - 27
  - 28
  - 29
  layer_scale_init:
    '0': 1.0
    '1': 1.0
    '2': 1.0
    '3': 1.0
    '4': 1.0
    '12': 1.0
    '13': 1.0
    '14': 1.0
    '15': 1.0
    '16': 1.0
    '25': 1.0
    '26': 1.0
    '27': 1.0
    '28': 1.0
    '29': 1.0
anchor:
  mode: instruction_text
  text_path: instruction_prompt.txt
training:
  batch_size: 2
  epochs: 5
  save_every_steps: 150
  max_grad_norm: 1.0
  seed: 42
  deterministic: false
  include_think: true
optim:
  lr_adapter: 0.0005
  weight_decay: 0.01
loss:
  anchor_type: cosine
  layer_objectives:
    upper_ce_weight: 0.5
    upper_kl_weight: 0.0
    upper_anchor_weight: 1
    middle_ce_weight: 0.0
    middle_kl_weight: 0.0
    middle_anchor_weight: 1
    lower_ce_weight: 0.0
    lower_kl_weight: 0.0
    lower_anchor_weight: 1
    think_end_weight: 5.0
